name: Test Marketplace Listings Fetch (read-only, no data changes)

on:
  workflow_dispatch:

jobs:
  test-listings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run isolated listings test (nothing is saved or committed)
        run: node scripts/test-listings.js
